<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AF (Account File) | Global Deep Intelligence</title>
<meta name="description" content="AF Global - Multi-agent AI for elite business strategy, CA AI, and market dominance.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<style>
:root{--surface:#12121d;--surface-low:#1b1a26;--surface-container:#1f1e2a;--surface-high:#292935;--surface-lowest:#0d0d18;--primary:#c6bfff;--primary-container:#6c5ce7;--tertiary:#2edcd7;--on-surface:#e3e0f1;--on-surface-dim:#c8c4d7;--outline:rgba(146,142,160,0.15);--error:#ef4444;--up:#10b981;--shadow-purple:0 20px 40px rgba(108,92,231,0.08)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Manrope',sans-serif;background:var(--surface);color:var(--on-surface)}
h1,h2,h3,.logo-text{font-family:'Space Grotesk',sans-serif}
.app{display:flex;height:100vh}
.sidebar{width:260px;flex-shrink:0;background:var(--surface-lowest);display:flex;flex-direction:column;padding:28px 20px;box-shadow:var(--shadow-purple)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--primary-container),var(--primary));display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-text{font-size:17px;font-weight:700;color:var(--primary)}
.logo-sub{font-size:10px;color:var(--on-surface-dim)}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.badge{background:rgba(108,92,231,0.08);border:1px solid rgba(108,92,231,0.2);color:var(--primary);font-size:11px;padding:5px 10px;border-radius:20px;cursor:pointer}
nav{flex:1;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:10px;color:var(--on-surface-dim);font-size:13.5px;cursor:pointer;border:none;background:none;text-align:left;transition:all .2s}
.nav-item.active{background:rgba(108,92,231,0.12);color:var(--primary)}
.sign-in-btn{margin-top:16px;width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--outline);color:var(--on-surface);font-size:13px;padding:11px 16px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:8px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:var(--surface-low)}
.topbar-title{font-size:13px;color:var(--on-surface-dim)}
.topbar-right{display:flex;align-items:center;gap:10px}
.status-pill{display:flex;align-items:center;gap:6px;background:rgba(46,220,215,0.08);border:1px solid rgba(46,220,215,0.2);padding:6px 13px;border-radius:20px;font-size:11.5px;color:var(--tertiary)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--tertiary);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pay-btn{border:none;padding:8px 15px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer}
.stripe-btn{background:linear-gradient(135deg,#6c5ce7,#c6bfff);color:#1a0060}
.razorpay-btn{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.workspace{flex:1;display:flex;overflow:hidden}
.chat-area{flex:1;display:flex;flex-direction:column;padding:20px 24px;min-width:0}
.chat{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px;padding-bottom:8px}
.msg{display:flex;gap:12px;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}
.bubble{background:var(--surface-container);padding:13px 17px;border-radius:16px;max-width:72%;font-size:13.5px;line-height:1.65}
.msg.user .bubble{background:rgba(108,92,231,0.15);border:1px solid rgba(108,92,231,0.15)}
.input-wrap{padding:16px 0 0}
.input-box{display:flex;align-items:center;gap:10px;background:var(--surface-container);border-radius:14px;padding:10px 16px}
.input-box input{flex:1;background:none;border:none;outline:none;color:var(--on-surface);font-size:13.5px}
.icon-btn{width:34px;height:34px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.send{background:linear-gradient(135deg,var(--primary-container),var(--primary));color:#fff}
.panel{width:230px;flex-shrink:0;background:var(--surface-low);padding:20px;display:flex;flex-direction:column;gap:20px;overflow-y:auto}
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--on-surface-dim);margin-bottom:10px}
.ticker{display:flex;justify-content:space-between;padding:7px 0;font-size:12.5px}
.up{color:var(--up)}.down{color:var(--error)}
.layer{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;margin-bottom:4px;background:rgba(255,255,255,0.02);border-radius:8px;font-size:12px;color:var(--on-surface-dim)}
.layer-status{font-size:10px;color:var(--tertiary)}
.footer-note{font-size:9.5px;color:rgba(46,220,215,0.5);text-align:center;margin-top:auto;padding-top:12px}
<div id="toast" style="position:fixed;bottom:20px;right:20px;background:#1f1e2a;color:#e3e0f1;padding:12px 20px;border-radius:10px;display:none;z-index:9999;border-left:4px solid #c6bfff"></div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDPrwG3BsLCLz3tsn6lvSuL9vQJg3VK-Gc",
  authDomain: "af-ai-store-f0761e.firebaseapp.com",
  projectId: "af-ai-store-f0761e",
  storageBucket: "af-ai-store-f0761e.appspot.com",
  messagingSenderId: "850581608566",
  appId: "1:850581608566:web:4306165c218e03b6d8a757"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

function showToast(m, e=true) {
  const t = document.getElementById("toast");
  if(!t)return;
  t.innerText = m; t.style.display = "block";
  t.style.borderLeftColor = e ? "#ef4444" : "#c6bfff";
  setTimeout(()=> t.style.display="none", 5000);
}

document.addEventListener("DOMContentLoaded", () => {
  const chat = document.getElementById("chat");
  const userInput = document.getElementById("user-input");
  const loginBtn = document.getElementById("login-btn");
  
  if(loginBtn) loginBtn.onclick = () => {
    auth.signInWithPopup(provider).catch(err => {
      showToast(err.code === 'auth/unauthorized-domain' ? "⚠️ Domain not authorized" : err.message);
    });
  };
  
  auth.onAuthStateChanged(u => {
    if(u && loginBtn) loginBtn.innerText = "Active: " + u.displayName;
  });
});

function addMsg(t, r, a) {
  const chat = document.getElementById("chat");
  if(!chat) return;
  const d = document.createElement("div");
  d.className = "msg " + r;
  const av = r === "user" ? "U" : (a || "AF");
  const safeText = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  d.innerHTML = `<div class="av">${av}</div><div class="bubble">${safeText}</div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const input = document.getElementById("user-input");
  const q = input.value.trim();
  if(!q) return;
  addMsg(q, "user");
  input.value = "";
  setTimeout(() => addMsg("**Assistant:** How can I help?", "assistant"), 600);
}

const sendBtn = document.getElementById("send-btn");
if(sendBtn) sendBtn.onclick = send;
const userInput = document.getElementById("user-input");
if(userInput) userInput.onkeypress = (e) => { if(e.key === "Enter") send(); };
</script>
</body></html>
