# Deploy Hosting + Firestore without local `firebase login`.
#
# Setup (once):
# 1. On your machine: `npm install -g firebase-tools` then `firebase login:ci`
# 2. GitHub repo → Settings → Secrets and variables → Actions
# 3. New repository secret: FIREBASE_TOKEN = (paste token from step 1)
#
# Run: Actions → "Deploy Firebase" → Run workflow

name: Deploy Firebase

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify hosting files
        run: node scripts/verify-hosting.mjs

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting and Firestore
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "Missing GitHub secret FIREBASE_TOKEN. Add it from: firebase login:ci"
            exit 1
          fi
          firebase deploy --only hosting,firestore \
            --project af-ai-store-f0761e \
            --non-interactive
