<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AF AI Chat - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1>AF AI Chat</h1>
      <p>Sign in or create an account to continue.</p>

      <form id="authForm" class="auth-form">
        <label for="emailInput">Email</label>
        <input id="emailInput" type="email" autocomplete="email" required />

        <label for="passwordInput">Password</label>
        <input id="passwordInput" type="password" autocomplete="current-password" required />

        <div class="auth-actions">
          <button type="submit" id="loginBtn">Login</button>
          <button type="button" id="signupBtn" class="ghost-btn">Sign up</button>
        </div>
      </form>

      <p id="authStatus" class="auth-status" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
